  - aid: cypress-semiconductor:psoc-hal
    name: PSoC HAL and Peripheral Driver Library (PDL)
    description: The PSoC Hardware Abstraction Layer (HAL) and Peripheral Driver Library (PDL) are
      the C-language embedded APIs developers use to program Cypress-originated PSoC 4, PSoC 6,
      and PSoC Edge microcontrollers. The mtb-hal-cat1 and mtb-pdl-cat1 libraries — distributed as
      ModusToolbox components — provide register-level and abstracted drivers for GPIO, SCB, TCPWM,
      Crypto, USB, and other PSoC peripherals. These libraries are the modern Infineon-branded
      replacement for the legacy Cypress PSoC Creator component library.
    tags:
      - C
      - Embedded Systems
      - HAL
      - Microcontrollers
      - PDL
      - PSoC
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg

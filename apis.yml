apis:
  - aid: cypress-semiconductor:modustoolbox
    name: ModusToolbox Software Ecosystem
    description: ModusToolbox is Infineon's modern embedded development ecosystem and the successor
      to Cypress' PSoC Creator. It is a collection of GUI and non-GUI tools, libraries, configurators,
      board support packages (BSPs), and middleware for building applications on PSoC Arm Cortex
      microcontrollers (inherited from Cypress), AIROC Wi-Fi and Bluetooth devices (formerly
      Cypress WICED), TRAVEO T2G automotive microcontrollers (inherited from Cypress), XMC industrial
      microcontrollers, and USB-C Power Delivery microcontrollers. ModusToolbox runs on Linux, macOS,
      and Windows, supports VS Code, Eclipse, and IAR IDEs, and ships with the GNU C compiler.
      The most recent stable release line as of 2026 is ModusToolbox v3.x (v3.7 reference in the
      Infineon developer community).
    tags:
      - AIROC
      - Embedded Development
      - IDE
      - ModusToolbox
      - PSoC
      - TRAVEO
      - XMC
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg

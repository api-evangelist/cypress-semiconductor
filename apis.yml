        type: Documentation
      - url: https://github.com/Infineon/mtb-pdl-cat1
        type: GitHubRepository
      - url: https://community.infineon.com/t5/TRAVEO-T2G/bd-p/TRAVEOT2GForum
        type: Support
  - aid: cypress-semiconductor:nor-flash
    name: Cypress / Infineon NOR Flash Memory
    description: Cypress' Semper, HyperFlash, FL-S, and FL-L Serial NOR Flash families became part
      of Infineon's memory portfolio after the 2020 acquisition. Developer-facing artifacts include
      the Semper Flash Configuration Tool (separate from ModusToolbox), reference drivers, and the
      serial-flash and serial-memory ModusToolbox middleware libraries that wrap SPI/QSPI/HyperBus
      access for PSoC hosts. The product line is documented under infineon.com/memory.
    tags:
      - Flash Memory
      - HyperFlash
      - Memory
      - NOR Flash
      - Semper

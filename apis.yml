name: Cypress Semiconductor
description: Cypress Semiconductor was a US-based semiconductor company known for its PSoC programmable
  system-on-chip microcontrollers, WICED Wi-Fi and Bluetooth connectivity stacks, NOR Flash memory,
  CapSense capacitive touch sensing, and Traveo automotive microcontrollers. Infineon Technologies
  completed its $9.4 billion acquisition of Cypress on April 16, 2020, and Cypress now operates as
  a wholly owned subsidiary of Infineon. The former Cypress product lines (PSoC, AIROC formerly
  WICED, NOR Flash, CapSense, Traveo) remain in active development under Infineon branding, and
  the cypress.com domain redirects to infineon.com. The former Cypress developer surface — including
  PSoC Creator (legacy) and the modern ModusToolbox embedded development ecosystem — is now hosted
  on the Infineon GitHub organization (github.com/Infineon) which contains 2,143 public repositories
  spanning code examples, board support packages, HAL libraries, middleware, and configurators for
  PSoC, AIROC, Traveo, XMC, and AURIX device families. The original Cypress GitHub organization
  (github.com/cypresssemiconductorco) has been wound down to four placeholder repos that redirect
  users to the Infineon org. Cypress' APIs are predominantly embedded software APIs (C/C++ HAL,
  PDL, middleware libraries) rather than HTTP/REST surfaces, consumed by firmware engineers via
  ModusToolbox, Eclipse, and Visual Studio Code workflows.

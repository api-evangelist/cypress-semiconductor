      - url: https://github.com/Infineon/mtb-pdl-cat1
        type: GitHubRepository
  - aid: cypress-semiconductor:airoc-bluetooth
    name: AIROC Bluetooth (formerly WICED)
    description: AIROC Bluetooth is the Infineon-rebranded Cypress WICED Bluetooth and Bluetooth LE
      software stack and SDK, supporting CYW20xxx, CYW43xxx, and AIROC combo Bluetooth/Wi-Fi parts
      inherited from the Cypress acquisition. Developers use the btsdk-* and AIROC libraries via
      ModusToolbox to build BLE peripherals, central applications, mesh networks, and Bluetooth
      audio products. WICED Studio has been deprecated in favor of ModusToolbox-based AIROC flows.
    tags:
      - AIROC
      - Bluetooth
      - BLE
      - Embedded Systems
      - WICED
      - Wireless
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg

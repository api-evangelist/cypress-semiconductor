  - aid: cypress-semiconductor:capsense
    name: CapSense Capacitive Touch Library
    description: CapSense is Cypress' (now Infineon's) capacitive touch sensing technology, exposed
      to firmware developers as a ModusToolbox middleware library and Device Configurator personality.
      CapSense supports buttons, sliders, touchpads, and proximity sensing on PSoC 4, PSoC 6, and
      PSoC Edge devices with SmartSense auto-tuning. The CapSense Configurator GUI generates the
      tuning C structures consumed at runtime by the CapSense library.
    tags:
      - CapSense
      - Embedded Systems
      - HMI
      - PSoC
      - Touch Sensing
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    baseURL: https://github.com/Infineon/capsense
    humanURL: https://infineon.github.io/capsense/capsense_api_reference_manual/html/index.html
    properties:
      - url: https://infineon.github.io/capsense/capsense_api_reference_manual/html/index.html
        type: Documentation
      - url: https://github.com/Infineon/capsense
        type: GitHubRepository
  - aid: cypress-semiconductor:traveo-t2g
    name: TRAVEO T2G Automotive Microcontroller SDK
    description: TRAVEO T2G is the automotive Arm Cortex-M microcontroller family inherited from
      Cypress, now developed under Infineon. Developers program TRAVEO T2G via ModusToolbox using
      a dedicated PDL, HAL, and BSP set (mtb-pdl-cat1, mtb-hal-cat1 variants and the cat1c CMSIS
      device support) for body, cluster, and gateway ECU applications. AURIX Development Studio
      remains the path for Infineon's TriCore AURIX automotive MCUs, while TRAVEO T2G stays on
      ModusToolbox.
    tags:
      - Automotive
      - Cortex-M
      - Embedded Systems
      - Microcontrollers
      - TRAVEO
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
